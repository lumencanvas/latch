name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-electron:
    name: Build Electron (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    environment: ${{ startsWith(matrix.os, 'macos') && 'Prod' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac-arm64
            arch: arm64
          - os: macos-15-intel
            name: mac-x64
            arch: x64
          - os: windows-latest
            name: win
            arch: x64
          - os: ubuntu-latest
            name: linux
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Import the Developer ID Application certificate into a temporary keychain so
      # electron-osx-sign can sign the app. Without this the app is unsigned
      # (TeamIdentifier=not set) and @electron/notarize's pre-check fails.
      - name: Import Apple signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "Signing identities available to the build:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build & Make
        run: npm run make -- --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS arm64: Upload zip and dmg
      - name: Upload macOS arm64 zip
        if: matrix.name == 'mac-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: latch-mac-arm64
          path: out/make/zip/darwin/arm64/*.zip

      - name: Upload macOS arm64 dmg
        if: matrix.name == 'mac-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: latch-mac-arm64-dmg
          path: out/make/*.dmg

      # macOS x64: Upload zip and dmg
      - name: Upload macOS x64 zip
        if: matrix.name == 'mac-x64'
        uses: actions/upload-artifact@v4
        with:
          name: latch-mac-x64
          path: out/make/zip/darwin/x64/*.zip

      - name: Upload macOS x64 dmg
        if: matrix.name == 'mac-x64'
        uses: actions/upload-artifact@v4
        with:
          name: latch-mac-x64-dmg
          path: out/make/*.dmg

      # Windows: Upload zip
      - name: Upload Windows artifact
        if: matrix.name == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: latch-win
          path: out/make/zip/win32/**/*.zip

      # Linux: Upload deb and zip
      - name: Upload Linux deb
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: latch-linux-deb
          path: out/make/deb/x64/*.deb

      - name: Upload Linux zip
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: latch-linux-zip
          path: out/make/zip/linux/**/*.zip

  create-release:
    name: Create Release
    needs: build-electron
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # macOS Apple Silicon (arm64)
          find artifacts/latch-mac-arm64 -name "*.zip" -exec cp {} release/LATCH-mac-arm64.zip \; 2>/dev/null || true
          find artifacts/latch-mac-arm64-dmg -name "*.dmg" -exec cp {} release/LATCH-mac-arm64.dmg \; 2>/dev/null || true
          # macOS Intel (x64)
          find artifacts/latch-mac-x64 -name "*.zip" -exec cp {} release/LATCH-mac-x64.zip \; 2>/dev/null || true
          find artifacts/latch-mac-x64-dmg -name "*.dmg" -exec cp {} release/LATCH-mac-x64.dmg \; 2>/dev/null || true
          # Universal macOS (copy arm64 as default for backwards compat)
          find artifacts/latch-mac-arm64 -name "*.zip" -exec cp {} release/LATCH-mac.zip \; 2>/dev/null || true
          find artifacts/latch-mac-arm64-dmg -name "*.dmg" -exec cp {} release/LATCH-mac.dmg \; 2>/dev/null || true
          # Windows
          find artifacts/latch-win -name "*.zip" -exec cp {} release/LATCH-win.zip \; 2>/dev/null || true
          # Linux
          find artifacts/latch-linux-deb -name "*.deb" -exec cp {} release/LATCH-linux.deb \; 2>/dev/null || true
          find artifacts/latch-linux-zip -name "*.zip" -exec cp {} release/LATCH-linux.zip \; 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy Web
    needs: build-electron
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/web
